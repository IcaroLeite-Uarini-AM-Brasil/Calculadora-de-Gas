<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Calculadora de Combustível</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px 20px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .resultado {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .resultado.active {
            display: block;
        }

        .resultado-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .resultado-item:last-child {
            border-bottom: none;
        }

        .resultado-label {
            font-weight: 600;
            color: #555;
        }

        .resultado-valor {
            color: #667eea;
            font-weight: 700;
            font-size: 1.1em;
        }

        .comparacao-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .card-titulo {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-valor {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-subtitulo {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .mensagem {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .mensagem.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .mensagem.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8em;
            }

            .tab-buttons {
                flex-direction: column;
            }

            .tab-btn {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 Calculadora de Combustível</h1>
            <p>Calcule o custo de suas viagens em tempo real</p>
        </header>

        <div class="content">
            <div class="mensagem" id="mensagem"></div>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="mudarAba('calculo')">📊 Cálculo</button>
                <button class="tab-btn" onclick="mudarAba('comparacao')">🔥 Comparação</button>
                <button class="tab-btn" onclick="mudarAba('historico')">📋 Histórico</button>
            </div>

            <!-- Aba Cálculo -->
            <div id="calculo" class="tab-content active">
                <div class="form-group">
                    <label for="distancia">Distância (km)</label>
                    <input type="number" id="distancia" placeholder="Ex: 100" min="0" step="0.1">
                </div>
                <div class="form-group">
                    <label for="consumo">Consumo (km/l)</label>
                    <input type="number" id="consumo" placeholder="Ex: 12" min="0.1" step="0.1">
                </div>
                <div class="form-group">
                    <label for="preco">Preço (R$/l)</label>
                    <input type="number" id="preco" placeholder="Ex: 6.50" min="0" step="0.01">
                </div>
                <button onclick="calcular()">Calcular</button>

                <div class="loading" id="loading1">
                    <div class="spinner"></div>
                </div>

                <div class="resultado" id="resultado1">
                    <div class="resultado-item">
                        <span class="resultado-label">⛽ Litros Necessários:</span>
                        <span class="resultado-valor" id="litros">-</span>
                    </div>
                    <div class="resultado-item">
                        <span class="resultado-label">💰 Custo Total:</span>
                        <span class="resultado-valor" id="custo">-</span>
                    </div>
                </div>
            </div>

            <!-- Aba Comparação -->
            <div id="comparacao" class="tab-content">
                <div class="form-group">
                    <label for="distancia2">Distância (km)</label>
                    <input type="number" id="distancia2" placeholder="Ex: 100" min="0" step="0.1">
                </div>
                <div class="form-group">
                    <label for="consumo2">Consumo (km/l)</label>
                    <input type="number" id="consumo2" placeholder="Ex: 12" min="0.1" step="0.1">
                </div>
                <button onclick="comparar()">Comparar Combustíveis</button>

                <div class="loading" id="loading2">
                    <div class="spinner"></div>
                </div>

                <div class="resultado" id="resultado2">
                    <div class="comparacao-grid" id="gridComparacao"></div>
                </div>
            </div>

            <!-- Aba Histórico -->
            <div id="historico" class="tab-content">
                <button onclick="carregarHistorico()">Atualizar Histórico</button>
                <button onclick="limparHistorico()" style="background: #dc3545; margin-top: 10px;">Limpar Histórico</button>

                <div class="resultado" id="resultado3" style="margin-top: 20px;">
                    <div id="listaHistorico"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function mudarAba(aba) {
            // Esconder todas as abas
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('active');
            });

            // Mostrar aba selecionada
            document.getElementById(aba).classList.add('active');
            event.target.classList.add('active');
        }

        function mostrarMensagem(texto, tipo) {
            const msg = document.getElementById('mensagem');
            msg.textContent = texto;
            msg.className = `mensagem ${tipo}`;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 5000);
        }

        function calcular() {
            const distancia = parseFloat(document.getElementById('distancia').value);
            const consumo = parseFloat(document.getElementById('consumo').value);
            const preco = parseFloat(document.getElementById('preco').value);

            if (!distancia || !consumo || !preco) {
                mostrarMensagem('❌ Preencha todos os campos', 'error');
                return;
            }

            document.getElementById('loading1').style.display = 'block';

            fetch('/api/calcular', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    distancia: distancia,
                    consumo: consumo,
                    preco: preco
                })
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading1').style.display = 'none';
                if (data.sucesso) {
                    document.getElementById('litros').textContent = data.litros + ' L';
                    document.getElementById('custo').textContent = 'R$ ' + data.custo;
                    document.getElementById('resultado1').classList.add('active');
                    mostrarMensagem('✅ Cálculo realizado com sucesso!', 'success');
                } else {
                    mostrarMensagem('❌ ' + data.erro, 'error');
                }
            })
            .catch(e => {
                document.getElementById('loading1').style.display = 'none';
                mostrarMensagem('❌ Erro na requisição', 'error');
            });
        }

        function comparar() {
            const distancia = parseFloat(document.getElementById('distancia2').value);
            const consumo = parseFloat(document.getElementById('consumo2').value);

            if (!distancia || !consumo) {
                mostrarMensagem('❌ Preencha todos os campos', 'error');
                return;
            }

            document.getElementById('loading2').style.display = 'block';

            fetch('/api/comparar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    distancia: distancia,
                    consumo: consumo
                })
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading2').style.display = 'none';
                if (data.sucesso) {
                    let html = '';
                    for (let comb in data.comparacao) {
                        const dados = data.comparacao[comb];
                        html += `
                            <div class="card">
                                <div class="card-titulo">${comb.toUpperCase()}</div>
                                <div class="card-valor">R$ ${dados.custo}</div>
                                <div class="card-subtitulo">${dados.litros} L @ R$ ${dados.preco}</div>
                            </div>
                        `;
                    }
                    document.getElementById('gridComparacao').innerHTML = html;
                    document.getElementById('resultado2').classList.add('active');
                    mostrarMensagem('✅ Comparação realizada!', 'success');
                }
            })
            .catch(e => {
                document.getElementById('loading2').style.display = 'none';
                mostrarMensagem('❌ Erro na requisição', 'error');
            });
        }

        function carregarHistorico() {
            fetch('/api/historico')
            .then(r => r.json())
            .then(data => {
                if (data.historico.length === 0) {
                    document.getElementById('listaHistorico').innerHTML = '<p>Nenhum histórico disponível</p>';
                } else {
                    let html = '';
                    data.historico.forEach((item, i) => {
                        html += `<div class="resultado-item">
                            <span class="resultado-label">#${i + 1} - ${item.timestamp.slice(0, 10)}</span>
                            <span class="resultado-valor">R$ ${item.custo_total.toFixed(2)}</span>
                        </div>`;
                    });
                    document.getElementById('listaHistorico').innerHTML = html;
                }
                document.getElementById('resultado3').classList.add('active');
            });
        }

        function limparHistorico() {
            if (confirm('Tem certeza? Essa ação não pode ser desfeita.')) {
                fetch('/api/limpar-historico', {method: 'DELETE'})
                .then(r => r.json())
                .then(data => {
                    mostrarMensagem('✅ Histórico limpo!', 'success');
                    document.getElementById('listaHistorico').innerHTML = '';
                });
            }
        }
    </script>
</body>
</html>
